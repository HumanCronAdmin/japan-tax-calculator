<div class="cover"><h1>Japan Tax Filing<br>Guide 2026</h1><p class="subtitle">Get Your Refund Back</p><p class="edition">The step-by-step guide to filing your tax return in Japan &mdash; in English</p><p class="brand">Japan Life Tools</p></div>
<div class="disclaimer"><strong>Disclaimer</strong><br>This guide provides general information about Japan's tax system based on publicly available data from the National Tax Agency (NTA), Ministry of Finance, Japan Pension Service, and other official government sources. It is <strong>not</strong> tax advice. For individual tax consultation, please contact a licensed tax accountant (${jp("税理士 / zeirishi")}).<br><br>The author is not a licensed tax professional. All figures and rules in this guide are based on official sources as of March 2026. Tax laws change annually &mdash; always verify current rates at <strong>nta.go.jp</strong> before filing.<br><br>This guide covers <strong>employees (給与所得者)</strong>. Freelancers, business owners, and cryptocurrency traders have different rules not covered here.</div>
<div class="toc"><h2>Table of Contents</h2><ul>${tocHtml}</ul></div>
<h2>Part 1: Do You Need to File?</h2>
<p>Most employees in Japan <strong>do not</strong> need to file a tax return. Your company handles everything through <strong>year-end adjustment</strong> (${jp("年末調整 / nenmatsu chousei")}) each December.</p><p>However, there are specific situations where you <strong>must</strong> file, or where filing voluntarily gets you money back.</p>
<h3>The Flowchart</h3>
<div class="flowchart"><div class="flow-q">Are you an employee receiving salary from ONE company?</div><div class="flow-arrow">&darr;</div><p><span class="flow-no">NO</span> You receive salary from 2+ companies &rarr; <strong>You must file.</strong></p><p><span class="flow-yes">YES</span> Continue &darr;</p><div class="flow-q">Is your annual salary over &yen;20,000,000?</div><div class="flow-arrow">&darr;</div><p><span class="flow-yes">YES</span> &rarr; <strong>You must file.</strong></p><p><span class="flow-no">NO</span> Continue &darr;</p><div class="flow-q">Do you have non-salary income over &yen;200,000?<br><span style="font-weight:400;font-size:10pt">(side jobs, rental income, stock gains outside 特定口座, etc.)</span></div><div class="flow-arrow">&darr;</div><p><span class="flow-yes">YES</span> &rarr; <strong>You must file.</strong></p><p><span class="flow-no">NO</span> Continue &darr;</p><div class="flow-q">Do any of these apply to you?</div>
${UL(["You paid over &yen;100,000 in medical expenses and want a deduction","You made furusato nozei donations to 6+ municipalities (or need to file for other reasons)","This is your first year claiming a housing loan deduction ("+jp("住宅ローン控除")+")","You changed jobs mid-year and your new employer didn't do year-end adjustment for both","You left or entered Japan mid-year","You want to claim deductions your company didn't process"])}
<p><span class="flow-yes">YES to any</span> &rarr; <strong>You should file</strong> (to get money back)</p><p><span class="flow-no">NO to all</span></p><div class="flow-result safe">Your company's year-end adjustment covers you. No filing needed.</div></div>
<p class="source">Source: NTA &mdash; Outline of Filing Final Tax Return (No.12011), nta.go.jp/english/taxes/individual/12011.htm</p>
<div class="info"><strong>Year-End Adjustment vs. Tax Return &mdash; What's the difference?</strong><br><strong>Year-end adjustment</strong> (${jp("年末調整")}) is done by your employer in December. They calculate your final tax for the year, adjust for overpayment, and refund the difference in your December or January paycheck.<br><br><strong>Tax return</strong> (${jp("確定申告 / kakutei shinkoku")}) is filed by you directly with the tax office, between February 16 and March 15. You do this when your situation is too complex for year-end adjustment, or when you want to claim deductions your employer can't process.</div>
<h3>What Happens If You Don't File</h3><p>If you were required to file but didn't, the NTA can impose penalties:</p>
<h4>Non-Filing Penalty (${jp("無申告加算税")})</h4>
${T(["Situation","Tax amount &le; &yen;500,000","&yen;500,001 &ndash; &yen;3,000,000","Over &yen;3,000,000"],[["You file voluntarily (before the NTA contacts you)","5%","5%","5%"],["You file after NTA notification but before investigation","10%","15%","25%"],["You file after a tax investigation","15%","20%","30%"]])}
<p class="source">Source: NTA &mdash; No.2024, nta.go.jp/taxes/shiraberu/taxanswer/shotoku/2024.htm</p>
<h4>Late Payment Interest (${jp("延滞税")})</h4>
${T(["Period","Rate (2026)"],[["First 2 months after deadline","2.8% per year"],["After 2 months","9.1% per year"]])}
<p class="source">Source: NTA &mdash; No.9205, nta.go.jp/taxes/shiraberu/taxanswer/osirase/9205.htm</p>
<div class="penalty-calc"><strong>Example:</strong> You owed &yen;100,000 in taxes and filed 6 months late after an NTA investigation.<br>&bull; Non-filing penalty: &yen;100,000 &times; 15% = <strong>&yen;15,000</strong><br>&bull; Late interest (approx.): &yen;100,000 &times; 2.8% &times; 2/12 + &yen;100,000 &times; 9.1% &times; 4/12 = <strong>&yen;3,500</strong><br>&bull; <strong>Total extra cost: &yen;18,500</strong> on top of the &yen;100,000 you already owe.</div>
<div class="tip"><strong>The good news:</strong> If you file voluntarily within 1 month of the deadline AND pay in full AND have no prior penalties in the last 5 years, the non-filing penalty is <strong>waived entirely</strong>.</div>
<div class="page-break"></div><h2>Part 2: What Changed in 2026 <span class="change-tag">UPDATED</span></h2>
<p>Japan's tax laws are revised annually. Here are the changes that affect your 2026 tax return (for income earned in 2026, filed in early 2027).</p>
<div class="warning"><strong>Important:</strong> Some 2025 reforms were one-time measures (e.g., the large basic deduction increase for low-income earners). Check the current year's rates at nta.go.jp before filing.</div>
<h3>1. Basic Deduction Increase (${jp("基礎控除")})</h3>
${T(["Total Income","2024 and before","2025","2026"],[["&le; &yen;1,320,000","&yen;480,000","&yen;950,000 *","TBC"],["&yen;1,320,001 &ndash; &yen;6,550,000","&yen;480,000","&yen;580,000 &ndash; &yen;880,000 *","&yen;580,000 + &yen;40,000"],["&yen;6,550,001 &ndash; &yen;23,500,000","&yen;480,000","&yen;580,000","<strong>&yen;620,000</strong>"],["&yen;23,500,001 &ndash; &yen;24,000,000","&yen;480,000","&yen;480,000","&yen;480,000"],["&yen;24,000,001 &ndash; &yen;24,500,000","&yen;320,000","&yen;320,000","&yen;320,000"],["&yen;24,500,001 &ndash; &yen;25,000,000","&yen;160,000","&yen;160,000","&yen;160,000"],["&gt; &yen;25,000,000","&yen;0","&yen;0","&yen;0"]])}
<p>* 2025 figures for low-income brackets are one-time special measures. From 2027 onward, these revert to &yen;580,000.</p><p>For most employees (income between &yen;6.55M and &yen;23.5M), the basic deduction increased by <strong>&yen;40,000</strong> from 2026.</p>
<p class="source">Source: MOF &mdash; FY2026 Tax Reform Outline, mof.go.jp/tax_policy/tax_reform/outline/fy2026/</p>
<h3>2. Employment Income Deduction Increase (${jp("給与所得控除")})</h3>
${T(["Item","2024 and before","2025","2026"],[["Minimum guaranteed deduction","&yen;550,000","&yen;650,000","<strong>&yen;690,000</strong>"]])}
<p>The minimum employment income deduction has been increasing to address the so-called "1.03 million yen wall" (${jp("103万円の壁")}) &mdash; the income threshold below which no income tax is owed.</p>
<div class="info"><strong>What this means for you:</strong> Combined with the basic deduction increase, the tax-free threshold for employment income has risen. If you earn under approximately &yen;1,310,000 per year, you may owe zero income tax.</div>
<p class="source">Source: MOF &mdash; FY2026 Tax Reform Outline; NTA &mdash; 2026 Withholding Tax Tables</p>

${T(["Change","Details"],[["Single parent deduction increase","&yen;350,000 &rarr; <strong>&yen;380,000</strong> (income tax)"],["High-income surcharge strengthened","Special deduction threshold: &yen;330M &rarr; &yen;165M; Rate: 22.5% &rarr; 30%"],["Housing loan deduction extended","5-year extension with expanded limits for energy-efficient homes"],["ID/Password e-Tax method","New registrations stopped from Oct 2025. Use My Number Card method instead"]])}
<div class="page-break"></div><h2>Part 3: Filing Step by Step</h2><p>This is the core of the guide. Follow these steps to file your tax return and get your refund.</p>
<h3>Step 1: Gather Your Documents</h3><p>Before you start, collect everything you need. Missing documents are the #1 reason people give up halfway.</p>
<h4>Required for everyone:</h4>
${CL(["<strong>Withholding tax statement</strong> ("+jp("源泉徴収票 / gensen choushuu hyou")+") &mdash; Your employer gives you this in January. It shows your annual income, taxes withheld, and deductions applied.","<strong>My Number Card</strong> ("+jp("マイナンバーカード")+") &mdash; Required for e-Tax. If you don't have one, you need My Number notification card + photo ID (driver's license or residence card).","<strong>Bank account information</strong> &mdash; For receiving your refund. The account must be in your name."])}
<h4>If claiming deductions (bring what applies):</h4>
${CL(["<strong>Medical expense receipts</strong> &mdash; Keep all receipts. You need a summary form ("+jp("医療費控除の明細書")+"), not individual receipts submitted.","<strong>Furusato nozei certificates</strong> ("+jp("寄附金受領証明書")+") &mdash; One from each municipality you donated to.","<strong>iDeCo contribution certificate</strong> ("+jp("小規模企業共済等掛金払込証明書")+") &mdash; Sent by the National Pension Fund Association in October-November.","<strong>Life insurance premium certificate</strong> ("+jp("生命保険料控除証明書")+") &mdash; Sent by your insurance company in autumn.","<strong>Remittance proof for overseas dependents</strong> &mdash; Bank transfer records showing you sent &ge; &yen;380,000/year to each dependent."])}
<div class="tip"><strong>Pro tip:</strong> Create a folder (physical or digital) labeled "Tax 2026" at the start of each year. Drop in every certificate and receipt as it arrives. By filing time, everything is in one place.</div>
<h3>Step 2: Set Up e-Tax</h3><p>e-Tax is the NTA's online filing system. It's the fastest way to file and get your refund (~3 weeks vs. 1-2 months for paper).</p>
<div class="warning"><strong>Important change:</strong> As of October 2025, the ID/Password method for e-Tax is no longer available for new users. You <strong>must</strong> use the My Number Card method.</div>
<h4>What you need:</h4>${UL(["My Number Card with valid electronic certificate","A smartphone with NFC (most modern phones) OR an IC card reader for your PC","The <strong>JPKI Reader</strong> app installed on your smartphone","Your card PINs: Signature PIN (6-16 alphanumeric) and User Certificate PIN (4 digits)"])}
<h4>Setup steps:</h4><ol><li>Go to the NTA's tax return preparation site (${jp("確定申告書等作成コーナー")})</li><li>Select "Create a return" &rarr; "Income tax"</li><li>Choose "Smart phone using My Number Card" or "PC using My Number Card"</li><li>Follow the on-screen instructions to scan your My Number Card</li><li>Register your basic information (name, address, etc.)</li></ol>
<div class="info"><strong>Language note:</strong> The e-Tax system is in <strong>Japanese only</strong>. The screenshots in this guide [PLACEHOLDER: screenshots to be added] show each screen with English labels. You can also use your browser's built-in translation (right-click &rarr; Translate to English), but double-check numbers are not altered.</div>
<p class="source">Source: e-Tax &mdash; e-tax.nta.go.jp/start/index.htm; My Number Card method &mdash; e-tax.nta.go.jp/kojin/mycd_login.htm</p>
<h3>Step 3: Fill In Your Tax Return</h3><p>Since 2022, there is only <strong>one type</strong> of tax return form (the old "Form A" and "Form B" were merged). The NTA's online system guides you through it automatically.</p>
<h4>The key sections you'll fill in:</h4>
${T(["Section","Japanese","What to enter"],[["Income",jp("収入金額等"),"Your total salary from your withholding tax statement ("+jp("支払金額")+")"],["Employment Income",jp("所得金額等"),"Auto-calculated from your salary after employment income deduction"],["Deductions from Income",jp("所得から差し引かれる金額"),"Social insurance, life insurance, medical expenses, dependents, basic deduction, etc."],["Tax Calculation",jp("税額の計算"),"Auto-calculated. Includes income tax + reconstruction special tax (2.1%)"],["Tax Withheld",jp("源泉徴収税額"),"The amount already deducted from your paychecks (from your withholding tax statement)"],["Refund Amount",jp("還付される税金"),"Tax withheld minus tax calculated = your refund"]])}
<div class="tip"><strong>The magic formula:</strong><br><code style="background:#e8e8e8;padding:4px 8px;border-radius:4px;font-size:10pt">Refund = Tax already withheld &minus; Actual tax owed</code><br>If your employer withheld more tax than you owe (because of deductions they didn't know about), you get the difference back.</div>
<p>[PLACEHOLDER: e-Tax screenshots with English annotations will be inserted here]</p>
<h3>Step 4: Submit</h3><p>You have three options:</p>
${T(["Method","How","Refund Speed"],[["<strong>e-Tax (recommended)</strong>","Submit directly from the online system after filling in","~3 weeks"],["Mail","Print, sign, and mail to your local tax office. Postmark date = filing date.","1&ndash;2 months"],["In person","Bring printed form to the tax office. Special help desks operate during Feb 16 &ndash; Mar 15.","1&ndash;2 months"]])}
<div class="info"><strong>Filing period:</strong> February 16 &ndash; March 15 each year.<br>If the deadline falls on a weekend, it's extended to the next Monday.<br><strong>Refund-only returns</strong> (where you're getting money back, not paying) can be filed from <strong>January 1</strong> &mdash; no need to wait until February 16.</div>
<p class="source">Source: NTA &mdash; Filing period, nta.go.jp/taxes/shiraberu/shinkoku/tokushu/; Refund processing, e-tax.nta.go.jp/kakunin/kanpukinsyori.htm</p>
<h3>Step 5: Get Your Refund</h3>
${T(["Submission method","Estimated processing time"],[["e-Tax (filed from home)","Approximately <strong>3 weeks</strong>"],["e-Tax (filed during peak Feb-Mar period)","Approximately <strong>1&ndash;1.5 months</strong> (slower due to volume)"],["Paper (mail or in person)","Approximately <strong>1&ndash;1.5 months</strong>"]])}
<p>Your refund is deposited directly into the bank account you specified. You can check the processing status:</p>${UL(["<strong>e-Tax users:</strong> Check status ~2 weeks after submission at e-tax.nta.go.jp","<strong>Paper filers:</strong> Check status ~1 month after submission"])}
<div class="tip"><strong>Want your refund fastest?</strong> File via e-Tax in January (for refund-only returns) before the February rush. Processing is much faster outside peak season.</div>
<div class="page-break"></div><h2>Part 4: Deductions You Might Be Missing</h2><p>These are deductions that your employer's year-end adjustment <strong>cannot</strong> process. You must file a tax return to claim them. Each one directly reduces your taxable income, which means money back in your pocket.</p>
<h3>4.1 Medical Expense Deduction (${jp("医療費控除")})</h3><p><strong>The rule:</strong> If your household's total medical expenses exceed <strong>&yen;100,000</strong> in a year, you can deduct the excess.</p>
${T(["Formula"],[["<code>Deduction = (Total medical expenses &minus; Insurance reimbursements) &minus; &yen;100,000</code><br>Maximum deduction: &yen;2,000,000<br>If your total income is under &yen;2,000,000: threshold is 5% of income instead of &yen;100,000"]])}
<h4>What counts:</h4>${UL(["Doctor and dentist fees (treatment, not cosmetic)","Prescription medicine","Hospital stays (room and meals)","Public transportation to/from the hospital","Acupuncture, massage, judo therapy (for treatment)","Nursing care services (certain categories)"])}
<h4>What does NOT count:</h4>${UL(["Cosmetic surgery","Health checkups (unless a disease is found and treated)","Vaccinations","Driving/parking costs for hospital visits","Supplements and health foods"])}
<h4>Self-Medication Tax System (alternative):</h4><p>If you spent over &yen;12,000 on designated OTC medicines, you can deduct the excess (up to &yen;88,000). This <strong>cannot</strong> be combined with regular medical expense deduction &mdash; choose one.</p>
<h4>Documents needed:</h4>${CL(["Medical expense statement form ("+jp("医療費控除の明細書")+") &mdash; summarize expenses by hospital/pharmacy","Keep receipts for 5 years (not submitted, but must be retained)"])}
<p class="source">Source: NTA &mdash; No.1120, No.1122, No.1129</p>
<h3>4.2 Furusato Nozei / Hometown Tax (${jp("ふるさと納税")})</h3><p><strong>The concept:</strong> Donate to any municipality in Japan. Get a tax deduction for the full amount minus &yen;2,000. Plus, you receive a thank-you gift (local food, crafts, etc.).</p>
<h4>How the deduction works (3 components):</h4>
${T(["Component","Calculation"],[["Income tax deduction","(Donation &minus; &yen;2,000) &times; your income tax rate"],["Resident tax deduction (basic)","(Donation &minus; &yen;2,000) &times; 10%"],["Resident tax deduction (special)","(Donation &minus; &yen;2,000) &times; (100% &minus; 10% &minus; income tax rate)"]])}
<p>The special component is capped at 20% of your resident tax. This sets the <strong>effective maximum</strong> donation where you still get full deduction.</p>
<h4>One-Stop Exception vs. Tax Return:</h4>
<div class="two-col"><div class="col-box"><h4>One-Stop Exception (${jp("ワンストップ特例")})</h4>${UL(["5 municipalities or fewer","No tax return needed","All deduction comes from resident tax","Deadline: January 10 of next year"])}</div><div class="col-box"><h4>Tax Return</h4>${UL(["6+ municipalities, OR you file for other reasons","Deduction split between income tax and resident tax","Deadline: March 15","<strong>If you file a return, all One-Stop applications are voided</strong> &mdash; you must include ALL donations"])}</div></div>
<div class="warning"><strong>Common trap:</strong> You used One-Stop for 3 donations, but later decide to file a return for medical expenses. Your One-Stop applications are now <strong>void</strong>. You must re-enter all 3 donations in your tax return, or you lose those deductions entirely.</div>
<h4>Documents needed:</h4>${CL(["Donation receipt ("+jp("寄附金受領証明書")+") from each municipality","Or: XML data from furusato nozei portal sites (can be imported into e-Tax)"])}
<p class="source">Source: MIC (soumu.go.jp) &mdash; Furusato Nozei portal; NTA &mdash; No.1155</p>
<h3>4.3 iDeCo Deduction (${jp("小規模企業共済等掛金控除")})</h3><p><strong>The rule:</strong> Your entire iDeCo contribution is deducted from taxable income. This is one of the most powerful deductions available.</p>
<h4>Monthly contribution limits:</h4>
${T(["Your situation","Monthly limit","Annual limit"],[["Self-employed (Category 1)","&yen;68,000","&yen;816,000"],["Employee (no corporate pension)","&yen;23,000","&yen;276,000"],["Employee (with corporate DC only)","&yen;20,000","&yen;240,000"],["Employee (with DB pension)","&yen;12,000","&yen;144,000"],["Civil servant","&yen;12,000","&yen;144,000"],["Dependent spouse (Category 3)","&yen;23,000","&yen;276,000"]])}
<div class="info"><strong>Tax saving example:</strong> Employee contributing &yen;23,000/month (&yen;276,000/year) with a 20% marginal tax rate saves approximately <strong>&yen;55,200 in income tax</strong> plus <strong>&yen;27,600 in resident tax</strong> = <strong>&yen;82,800/year</strong>.</div>
<h4>Documents needed:</h4>${CL(["Contribution certificate ("+jp("小規模企業共済等掛金払込証明書")+") &mdash; arrives October-November from the National Pension Fund Association"])}
<p class="source">Source: NTA &mdash; No.1135; iDeCo official site (ideco-koushiki.jp)</p>
<h3>4.4 Life Insurance Premium Deduction (${jp("生命保険料控除")})</h3><p>Three categories of insurance premiums can be deducted:</p>
${T(["Category","New contracts (2012+)","Old contracts (before 2012)"],[["General life insurance ("+jp("一般")+")","Max &yen;40,000","Max &yen;50,000"],["Medical/nursing insurance ("+jp("介護医療")+")","Max &yen;40,000","N/A"],["Individual pension insurance ("+jp("個人年金")+")","Max &yen;40,000","Max &yen;50,000"],["<strong>Total maximum</strong>","<strong>&yen;120,000</strong>","<strong>&yen;100,000</strong>"]])}
<p>Most employees handle this through year-end adjustment. You only need to file a tax return if your employer didn't process it.</p>
<h3>4.5 Earthquake Insurance Deduction (${jp("地震保険料控除")})</h3><p>Premiums for earthquake insurance: deductible up to <strong>&yen;50,000</strong>. Usually processed through year-end adjustment.</p>
<h3>4.6 Dependent Deduction &mdash; Including Overseas Family (${jp("扶養控除")})</h3><p>You can claim dependents who rely on you financially, even if they live overseas.</p>
<h4>Deduction amounts:</h4>${T(["Dependent type","Deduction"],[["General (age 16+)","&yen;380,000"],["Specified (age 19&ndash;22)","&yen;630,000"],["Elderly (age 70+, not living together)","&yen;480,000"],["Elderly (age 70+, living together)","&yen;580,000"]])}
<h4>Special rules for overseas dependents (ages 30&ndash;69):</h4><p>Since 2023, dependents aged 30&ndash;69 living outside Japan are <strong>only</strong> eligible if one of these applies:</p><ol><li>They left Japan for study purposes (proof required)</li><li>They have a disability</li><li>You sent them <strong>&ge; &yen;380,000/year</strong> (proof of remittance required)</li></ol>
<h4>Documents needed (overseas dependents):</h4>${CL(["Proof of family relationship (birth certificate, marriage certificate, family register &mdash; with Japanese translation if in a foreign language)","Proof of remittance (bank transfer records showing transfers to <strong>each</strong> dependent)","Study abroad certificate (if applicable)"])}
<p class="source">Source: NTA &mdash; No.1180, No.1159; NTA overseas dependents Q&A PDF</p>
<div class="page-break"></div><h2>Part 5: Case Studies</h2><p>Let's walk through four common scenarios step by step. All use the 2026 income tax rates and deductions.</p>
<h3>Case A: Employee + Furusato Nozei + Medical Expenses</h3>
<div class="col-box"><h4>Profile</h4>${UL(["Annual salary: &yen;6,000,000","Age: 32, single, no dependents","Furusato nozei: &yen;60,000 to 4 municipalities (used One-Stop, but now filing for medical)","Medical expenses: &yen;180,000 (no insurance reimbursement)","Social insurance premiums: &yen;870,000 (from withholding tax statement)"])}</div>
<h4>Step-by-step calculation:</h4>
${T(["Step","Calculation","Amount"],[["1. Salary","","&yen;6,000,000"],["2. Employment income deduction","&yen;6,000,000 &times; 20% + &yen;440,000","&minus; &yen;1,640,000"],["3. Employment income (所得)","","&yen;4,360,000"],["4. Basic deduction","","&minus; &yen;620,000"],["5. Social insurance deduction","","&minus; &yen;870,000"],["6. Medical expense deduction","&yen;180,000 &minus; &yen;100,000","&minus; &yen;80,000"],["7. Furusato nozei (income tax portion)","&yen;60,000 &minus; &yen;2,000","&minus; &yen;58,000"],["8. Taxable income","&yen;4,360,000 &minus; &yen;1,628,000","<strong>&yen;2,732,000</strong>"],["9. Income tax","&yen;2,732,000 &times; 10% &minus; &yen;97,500","&yen;175,700"],["10. + Reconstruction tax (2.1%)","&yen;175,700 &times; 1.021","&yen;179,389"],["11. Tax withheld by employer","(from withholding statement, assuming no deductions claimed)","&yen;213,900"],["12. <strong>Refund</strong>","&yen;213,900 &minus; &yen;179,389",'<span style="color:#16a34a;font-weight:700">&yen;34,511</span>']])}
<div class="warning"><strong>Remember:</strong> Because this person is filing a tax return, the One-Stop furusato nozei applications are <strong>voided</strong>. All 4 donations must be declared in the return.</div>
<h3>Case B: Employee + Side Income (&yen;200,000+ Rule)</h3>
<div class="col-box"><h4>Profile</h4>${UL(["Main job salary: &yen;5,000,000","Side income (freelance writing): &yen;350,000 (after expenses)","Age: 28, single"])}</div>
<p>Side income exceeds &yen;200,000 &rarr; <strong>must file</strong>.</p><p>The &yen;350,000 is added as "miscellaneous income" (${jp("雑所得")}). Total income = main salary employment income + &yen;350,000. The combined amount is taxed at the appropriate bracket.</p>
<div class="info"><strong>Key point:</strong> The &yen;200,000 threshold is for <strong>income tax only</strong>. For resident tax, there is no threshold &mdash; even &yen;1 of side income should be reported to your municipality.</div>
<h3>Case C: Mid-Year Job Change</h3>
<div class="col-box"><h4>Profile</h4>${UL(["Company A (Jan&ndash;Jun): salary &yen;2,500,000, tax withheld &yen;52,000","Company B (Aug&ndash;Dec): salary &yen;2,200,000, tax withheld &yen;45,000","Unemployed July (no income)"])}</div>
<p>If you gave Company B your withholding tax statement from Company A, they can do year-end adjustment for both. If you didn't (common), you need to file yourself.</p><p><strong>What to do:</strong> Add both salaries together (&yen;4,700,000), calculate total tax, subtract total withheld (&yen;97,000). You'll likely get a refund because each company withheld tax as if you'd work there the full year.</p>
<h3>Case D: Arrived or Left Japan Mid-Year</h3>
<div class="col-box"><h4>Profile (arrival)</h4>${UL(["Arrived in Japan: April 1, 2026","Salary from Japanese employer (Apr&ndash;Dec): &yen;4,500,000"])}</div>
<p>You're taxed only on income earned <strong>while residing in Japan</strong>. Income from before your arrival is generally not taxable in Japan (check treaty provisions with your home country).</p><p>Your employer will do year-end adjustment for the April&ndash;December period. Filing is likely unnecessary unless you have deductions to claim.</p>
<div class="col-box"><h4>Profile (departure)</h4>${UL(["Working in Japan: Jan&ndash;September 2026","Leaving Japan: October 1, 2026"])}</div>
<p><strong>Critical steps before leaving:</strong></p><ol><li>File a "departure return" (${jp("準確定申告")}) before you leave, or appoint a tax agent (${jp("納税管理人")}) to file on your behalf after you leave</li><li>Settle or arrange payment for resident tax (see Part 7)</li><li>Consider pension lump-sum withdrawal (see Part 7)</li></ol>
<div class="page-break"></div><h2>Part 6: Common Mistakes &amp; Troubleshooting</h2>
<h3>6.1 Income (${jp("収入")}) vs. Taxable Income (${jp("所得")})</h3><p>This is the single most confusing concept for foreigners filing in Japan. They are <strong>not the same thing</strong>.</p>
${T(["","Income ("+jp("収入 / shuunyuu")+")","Taxable Income ("+jp("所得 / shotoku")+")"],[["What it means","Your total salary before anything is subtracted","Your salary after the employment income deduction"],["On your withholding statement",jp("支払金額"),jp("給与所得控除後の金額")],["Example (&yen;5M salary)","&yen;5,000,000","&yen;3,560,000"]])}
<p>When a form asks for ${jp("所得")}, do NOT enter your raw salary. This is the most common mistake.</p>
<h3>6.2 Reading Your Withholding Tax Statement (${jp("源泉徴収票")})</h3><p>Your withholding tax statement is a single page that contains everything you need for your tax return. Here's what each field means:</p>
${T(["Japanese","English","What it is"],[[jp("支払金額"),"Amount paid","Your total gross salary for the year"],[jp("給与所得控除後の金額"),"Amount after employment income deduction","Your salary minus the automatic employment deduction"],[jp("所得控除の額の合計額"),"Total income deductions","Sum of all deductions (basic, social insurance, dependents, etc.)"],[jp("源泉徴収税額"),"Tax withheld","The total income tax + reconstruction tax already deducted from your paychecks"],[jp("社会保険料等の金額"),"Social insurance premiums","Total social insurance paid (health + pension + employment)"],[jp("生命保険料の控除額"),"Life insurance deduction","Deduction amount for life insurance premiums"],[jp("配偶者控除の額"),"Spouse deduction","Deduction for a qualifying spouse"]])}
<p>[PLACEHOLDER: Annotated image of a real withholding tax statement with English labels]</p>
<h3>6.3 e-Tax Common Errors</h3>
${T(["Problem","Solution"],[["My Number Card won't scan","Remove phone case. Hold card flat against NFC reader (usually upper back of phone). Keep still for 3+ seconds. Ensure JPKI Reader app is running."],['"Certificate expired" error',"Electronic certificates expire after 5 years. Visit your city hall to renew (free, takes 10 min)."],["Browser compatibility issues","Use the latest versions of Chrome, Edge, or Safari. Firefox has limited support. Clear cache if forms don't load."],["Numbers look wrong after browser translation","Browser translation can alter form values. Always verify numbers match your documents before submitting."],["Can't find my tax office","Search your address at nta.go.jp &rarr; "+jp("税務署の所在地")+". Your tax office is based on your January 1 address."]])}
<div class="page-break"></div><h2>Part 7: Leaving Japan</h2><p>If you're leaving Japan permanently, there are three financial matters to handle before you go. Missing these can cost you hundreds of thousands of yen.</p>
<h3>7.1 Appointing a Tax Agent (${jp("納税管理人")})</h3><p>If you leave Japan before the tax filing deadline, you need someone in Japan to handle your taxes.</p>
<h4>What a tax agent does:</h4>${UL(["Files your tax return on your behalf","Receives and responds to NTA correspondence","Pays any taxes owed / receives refunds"])}
<h4>How to set up:</h4><ol><li>Find someone willing to act as your agent (friend, colleague, accountant &mdash; must have a Japanese address)</li><li>Fill in the <strong>Tax Agent Notification Form</strong> (${jp("所得税・消費税の納税管理人の届出書")})</li><li>Submit to your local tax office <strong>before</strong> you leave Japan</li></ol>
<p><strong>Alternative:</strong> File a "departure return" (${jp("準確定申告")}) yourself before leaving. This covers income from January 1 to your departure date.</p>
<p class="source">Source: NTA &mdash; No.1923, nta.go.jp/taxes/shiraberu/taxanswer/shotoku/1923.htm</p>
<h3>7.2 Pension Lump-Sum Withdrawal (${jp("脱退一時金")})</h3><p>Non-Japanese nationals who leave Japan can claim back a portion of their pension contributions.</p>
<h4>Eligibility (all must apply):</h4>${UL(["Not a Japanese national","No longer residing in Japan (address de-registered)","Not currently enrolled in pension insurance","Have never received pension benefits","Had 6+ months of pension contributions","<strong>Apply within 2 years of leaving Japan</strong>"])}
<h4>How much you get back (Employees' Pension):</h4>
${T(["Months contributed","Months used for calculation"],[["6&ndash;11","6"],["12&ndash;17","12"],["18&ndash;23","18"],["24&ndash;29","24"],["30&ndash;35","30"],["36&ndash;41","36"],["42&ndash;47","42"],["48&ndash;53","48"],["54&ndash;59","54"],["60+","60 (maximum)"]])}
<p>Formula: <code>Average Standard Monthly Remuneration &times; Contribution Rate &times; Calculation Months</code></p>
<div class="warning"><strong>Tax on withdrawal:</strong> 20.42% income tax is automatically withheld. You can claim part of this back by filing a tax return through a tax agent (${jp("納税管理人")}) &mdash; another reason to appoint one before you leave.</div>
<h4>How to apply:</h4><ol><li>De-register your address at city hall (get ${jp("転出届")})</li><li>After leaving Japan, mail the application form with required documents to the Japan Pension Service</li><li>Processing takes 3&ndash;6 months</li><li>Payment is made to your overseas bank account</li></ol>
<p class="source">Source: Japan Pension Service &mdash; nenkin.go.jp/international/japanese-system/withdrawalpayment/payment.html</p>
<h3>7.3 Resident Tax After Departure (${jp("住民税")})</h3><p>Resident tax is based on where you live on <strong>January 1</strong>.</p>
${T(["When you leave","What happens"],[["Before January 1 (e.g., December)","No resident tax for the following year (you weren't a resident on Jan 1)"],["After January 1 (e.g., March)","You owe the <strong>full year's</strong> resident tax (based on previous year's income)"]])}
<h4>How to handle it:</h4>${UL(["<strong>Ask your employer</strong> to deduct remaining resident tax in a lump sum from your final paycheck ("+jp("一括徴収")+")","<strong>Or</strong> appoint a resident tax agent at your city/ward office (separate from the income tax agent at the tax office)","<strong>Or</strong> pay the remaining balance before you leave"])}
<div class="tip"><strong>Strategic timing:</strong> If possible, leaving Japan before January 1 can save you an entire year of resident tax. Resident tax is typically 10% of your previous year's income, so for a &yen;5M salary, that's roughly &yen;250,000.</div>
<p class="source">Source: MIC &mdash; soumu.go.jp (individual resident tax overview); Tokyo Metropolitan Government tax page</p>
